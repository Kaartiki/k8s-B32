apiVersion: v1
kind: ReplicationController
metadata: 
  name: my-rc
  labels: 
    app: myapp
spec:
  replicas: 5
  selector:
    app: myapp
  template:
    metadata: 
      name: my-rc-template
      labels:
        app: myapp
    spec:
      containers: 
       - name: tomcat-container
         image: tomcat:latest
         ports:
         - name: tomcatport
           containerPort: 8080
...
---
apiVersion: v1
kind: service
metadata: 
  name: rc-svc
  labels:
    app: myapp
  spec:
    type: NodePort
    selector:
      app: myapp
    ports:
    - name: svc-port
      protocol: TCP
      port: 8080
      targetport: 8080